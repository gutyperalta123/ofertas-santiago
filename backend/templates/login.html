<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar | OFERTAS SANTIAGO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(180deg, #050a14 0%, #0b1424 100%);
            color: white;
            font-family: Arial, Helvetica, sans-serif;
        }
        .box {
            max-width: 520px;
            margin: 70px auto;
            background: #101b2f;
            border-radius: 22px;
            padding: 30px;
            border: 1px solid rgba(29, 211, 255, 0.16);
        }
        .title {
            color: #1dd3ff;
            font-weight: 900;
        }
        .form-control {
            background: #0a1322;
            color: white;
            border: 1px solid #294160;
        }
        .form-control:focus {
            background: #0a1322;
            color: white;
            border-color: #1dd3ff;
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <h2 class="title mb-4">Ingresar para vender</h2>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Email o teléfono</label>
                    <input type="text" name="acceso" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-info text-dark fw-bold w-100">Iniciar sesión</button>
            </form>

            <div class="mt-3 text-center">
                <a href="/register" class="text-info">Todavía no tengo cuenta</a>
            </div>

            <div class="mt-2 text-center">
                <a href="/" class="text-light">Volver al inicio</a>
            </div>
        </div>
    </div>
</body>
</html>
